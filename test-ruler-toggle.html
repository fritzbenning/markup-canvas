<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruler Toggle Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #canvas {
            width: 800px;
            height: 600px;
            border: 1px solid #ccc;
            position: relative;
            background: #f9f9f9;
        }
        .test-content {
            position: absolute;
            background: #007acc;
            color: white;
            padding: 20px;
            border-radius: 8px;
            top: 200px;
            left: 300px;
        }
        .instructions {
            margin-bottom: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="instructions">
        <h3>Ruler Toggle Test</h3>
        <p><strong>Instructions:</strong></p>
        <ul>
            <li>Click on the canvas to focus it</li>
            <li>Press <strong>R</strong> to toggle rulers on/off</li>
            <li>Press <strong>G</strong> to toggle grid on/off</li>
            <li>Use arrow keys to pan, +/- to zoom</li>
        </ul>
    </div>

    <div id="canvas">
        <div class="test-content">
            <h3>Test Content</h3>
            <p>Press R to toggle rulers!</p>
        </div>
    </div>

    <script src="dist/markup-canvas.umd.min.js"></script>
    <script>
        function initTest() {
            const container = document.getElementById('canvas');
            
            const canvas = MarkupCanvas.createMarkupCanvas(container, {
                width: 2000,
                height: 1500,
                enableKeyboardControls: true,
                rulerSize: 24,
                showGrid: true,
                gridColor: 'rgba(0, 123, 255, 0.1)'
            });

            if (canvas) {
                // Focus the container to enable keyboard events
                canvas.container.focus();
                console.log('Ruler toggle test initialized!');
                console.log('Press R to toggle rulers, G to toggle grid');
            } else {
                console.error('Failed to initialize canvas');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initTest);
        } else {
            initTest();
        }
    </script>
</body>
</html>
